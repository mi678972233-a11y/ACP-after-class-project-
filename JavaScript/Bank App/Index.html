<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank App - Income & Expenses Tracker</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="Style.CSS">
</head>
<body>

<div class="container">

    <h1> Bank App</h1>

    <!-- Balance -->
    <div class="balance">
        <h2>Balance: <span id="balance">0</span> PKR</h2>
    </div>

    <!-- Income & Expense -->
    <div class="summary">
        <div class="income">
            <h3>Income</h3>
            <p id="income">0</p>
        </div>

        <div class="expense">
            <h3>Expenses</h3>
            <p id="expense">0</p>
        </div>
    </div>

    <!-- Form -->
    <div class="form">
        <input type="text" id="desc" placeholder="Enter description">
        <input type="number" id="amount" placeholder="Enter amount">

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button onclick="addTransaction()">Add</button>
    </div>

    <!-- Transaction List -->
    <h3>History</h3>
    <ul id="list"></ul>

</div>

<!-- JavaScript -->
<script src="Script.JS"></script>

</body>
</html>
