<!DOCTYPE html>
<html>
    <body>
        <h2>Login Form - Age Validation (18+ only)</h2>
        <form id="loginForm">
            Name: <input type="text" id="name" required><br><br>
            Age: <input type="number" id="age" required><br><br>
            <button type="submit">Login</button>
        </form>
        <p id="result"></p>

        <script>
            document.getElementById("loginForm").onsubmit = function(event) {
                event.preventDefault();  // Prevent form from submitting
                
                var name = document.getElementById("name").value;
                var age = document.getElementById("age").value;
                
                // Validate name
                if(name === "") {
                    document.getElementById("result").innerHTML = "Please enter your name";
                    return;
                }
                
                // Validate age (must be 18 or older)
                if(age < 18) {
                    document.getElementById("result").innerHTML = "You must be 18 or older to login";
                    return;
                }
                
                // If validation passes
                document.getElementById("result").innerHTML = "Welcome " + name + "! Login successful";
            }
        </script>
    </body>
</html>
